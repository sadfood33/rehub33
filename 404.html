<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — 404 | ТыСпас</title>
    <meta name="description" content="Страница не найдена. Вернитесь на главную страницу.">
    
    <style>
        :root {
            --primary: #2563eb; --text: #1f2937; --bg: #f3f4f6; --white: #ffffff;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { color: var(--text); line-height: 1.7; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        
        .error-page { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; }
        .error-content h1 { font-size: 120px; color: var(--primary); margin-bottom: 20px; }
        .error-content h2 { font-size: 32px; margin-bottom: 20px; }
        .error-content p { margin-bottom: 30px; }
        .btn { padding: 15px 40px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; display: inline-block; }
        .btn:hover { background: var(--primary-dark); }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="container">
            <div class="error-content">
                <h1>404</h1>
                <h2>Страница не найдена</h2>
                <p>К сожалению, запрашиваемая страница не найдена.</p>
                <a href="/" class="btn">Вернуться на главную</a>
            </div>
        </div>
    </div>
</body>
</html>
